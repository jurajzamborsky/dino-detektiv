<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Zauri"/>
  <meta name="theme-color" content="#F9F4E8"/>
  <title>Zauri 🦖</title>
  <link rel="manifest" href="/public/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
  :root {
    --green: #4caf76; --green-d: #2d8a52;
    --orange: #f9c74f; --orange-d: #e07310;
    --bg: #0a2215; --surface: rgba(255,255,255,.06);
    --text: #f9edd9; --dim: rgba(249,237,217,.6); --light: rgba(249,237,217,.35);
    --success: #4caf76; --info: #7DB7D9; --amber: #f9c74f; --red: #d43b28;
    --border: rgba(249,237,217,.13);
    --sh: 0 2px 10px rgba(0,0,0,.25);
    --sh-md: 0 4px 20px rgba(0,0,0,.35);
    --sh-lg: 0 8px 32px rgba(0,0,0,.45);
    --r: 18px; --r-sm: 12px; --r-lg: 26px; --r-pill: 100px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{height:100%;scroll-behavior:smooth}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#0a2215 0%,#163520 55%,#0c1e14 100%);background-attachment:fixed;color:var(--text);min-height:100%;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom,20px)}
  img{max-width:100%;display:block}
  button,label{cursor:pointer}

  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes bounceIn{0%{transform:scale(.82);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
  @keyframes cardIn{from{transform:translateY(22px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
  @keyframes shimmer{0%,100%{opacity:.35}50%{opacity:1}}
  @keyframes roarShake{0%,100%{transform:scale(1)}20%{transform:scale(1.1) rotate(-3deg)}40%{transform:scale(1.08) rotate(3deg)}60%{transform:scale(1.04) rotate(-1deg)}}
  @keyframes celebrate{0%,100%{transform:scale(1) rotate(0)}30%{transform:scale(1.25) rotate(-10deg)}60%{transform:scale(1.2) rotate(8deg)}}
  @keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.9)}}

  /* SCREENS */
  .screen{display:none;min-height:100vh;animation:fadeUp .3s ease both}
  .screen.active{display:block}

  /* LOADING */
  #overlay-loading{display:none;position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#0a2215 0%,#163520 55%,#0c1e14 100%);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
  #overlay-loading.on{display:flex;animation:fadeIn .2s ease}
  .ld-dino{font-size:5rem;animation:hop 1.5s ease-in-out infinite;margin-bottom:20px}
  .ld-msg{font-size:1.1rem;font-weight:800;color:var(--text);max-width:270px;line-height:1.55;min-height:56px}
  .ld-dots{display:flex;gap:8px;justify-content:center;margin-top:18px}
  .ld-dot{width:10px;height:10px;border-radius:50%;animation:shimmer .9s infinite}
  .ld-dot:nth-child(1){background:var(--green)}
  .ld-dot:nth-child(2){background:var(--orange);animation-delay:.18s}
  .ld-dot:nth-child(3){background:var(--amber);animation-delay:.36s}

  /* MEMORY OVERLAY */
  #overlay-memory{display:none;position:fixed;inset:0;z-index:190;background:rgba(47,42,36,.55);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:24px}
  #overlay-memory.on{display:flex;animation:fadeIn .25s ease}
  .mem-card{background:#163520;border:2px solid rgba(249,199,79,.25);border-radius:var(--r-lg);padding:28px 24px;max-width:380px;width:100%;text-align:center;box-shadow:var(--sh-lg);animation:bounceIn .35s ease}
  .mem-emoji{font-size:3rem;margin-bottom:12px}
  .mem-q{font-family:'Fredoka',cursive;font-size:1.45rem;color:#f9c74f;margin-bottom:20px;line-height:1.4}
  .mem-opts{display:flex;flex-direction:column;gap:10px}
  .mem-opt{padding:14px 20px;border-radius:var(--r);border:2.5px solid rgba(249,237,217,.2);background:rgba(255,255,255,.07);font-family:inherit;font-size:1rem;font-weight:800;color:#f9edd9;transition:all .2s}
  .mem-opt:active{transform:scale(.97)}
  .mem-opt.correct{background:#EFF8EE;border-color:var(--success);color:var(--success)}
  .mem-opt.wrong{background:#FFF0EE;border-color:var(--red);color:var(--red)}
  .mem-fb{font-size:1rem;font-weight:800;margin-top:14px;min-height:22px}
  .mem-fb.ok{color:var(--success)}
  .mem-fb.no{color:var(--red)}
  .mem-cont{display:none;margin-top:14px}

  /* LAYOUT */
  .wrap{max-width:480px;margin:0 auto;padding:0 18px}

  /* HEADER */
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;max-width:480px;margin:0 auto}
  .logo{font-family:'Fredoka',cursive;font-size:1.9rem;font-weight:700;color:#f9c74f;letter-spacing:.5px;text-decoration:none;cursor:pointer}
  .logo em{color:#f5a623;font-style:normal}
  .btn-back{display:flex;align-items:center;gap:5px;font-size:.9rem;font-weight:800;color:rgba(249,237,217,.55);border:none;background:none;padding:8px 0;font-family:inherit}

  /* BUTTONS */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--r-pill);font-family:inherit;font-weight:800;cursor:pointer;transition:all .2s;-webkit-appearance:none;text-decoration:none;width:100%}
  .btn:active{transform:scale(.96)}
  .btn-green{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;font-size:1.08rem;padding:15px 28px;box-shadow:0 6px 20px rgba(111,175,106,.38)}
  .btn-orange{background:linear-gradient(135deg,var(--orange),var(--orange-d));color:#fff;font-size:1rem;padding:14px 28px;box-shadow:0 5px 18px rgba(244,163,64,.38)}
  .btn-ghost{background:transparent;border:2px solid rgba(249,237,217,.2);color:rgba(249,237,217,.55);font-size:.95rem;padding:12px 24px}
  .btn-ghost:active{border-color:var(--green);color:var(--green)}
  .btn-icon{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(249,237,217,.15);font-size:1.1rem;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center}

  /* HOME */
  .home-hero{text-align:center;padding:28px 20px 20px}
  .home-dino{font-size:5rem;display:inline-block;animation:hop 2.2s ease-in-out infinite}
  .home-title{font-family:'Fredoka',cursive;font-size:3rem;margin:10px 0 6px;letter-spacing:.5px}
  .home-title .z{color:#f9c74f}
  .home-title .a{color:#f5a623}
  .home-sub{font-size:1rem;color:rgba(249,237,217,.6);font-weight:700;max-width:260px;margin:0 auto 24px;line-height:1.65}
  .capture-lbl{display:block;background:linear-gradient(135deg,var(--green),var(--green-d));border-radius:var(--r-lg);padding:26px 24px;text-align:center;box-shadow:0 8px 28px rgba(111,175,106,.4);animation:pulse 3.5s ease-in-out infinite;margin-bottom:20px}
  .capture-lbl:active{transform:scale(.97);animation:none}
  .capture-icon{font-size:2.8rem;display:block;margin-bottom:8px}
  .capture-title{font-family:'Fredoka',cursive;font-size:1.55rem;color:#fff;margin-bottom:3px}
  .capture-sub{font-size:.85rem;color:rgba(255,255,255,.8)}
  .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
  .quick-card{background:rgba(255,255,255,.06);border-radius:var(--r);padding:16px;border:2px solid rgba(249,237,217,.13);text-align:center;transition:all .2s}
  .quick-card:active{border-color:var(--green);transform:scale(.97)}
  .quick-icon{font-size:1.9rem;margin-bottom:6px}
  .quick-lbl{font-size:.85rem;font-weight:800;color:rgba(249,237,217,.6)}
  .sec-title{font-family:'Fredoka',cursive;font-size:1.1rem;color:#f9c74f;margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .recent-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .recent-row::-webkit-scrollbar{display:none}
  .recent-card{flex-shrink:0;width:100px;background:rgba(255,255,255,.06);border-radius:var(--r);padding:12px 8px;text-align:center;border:2px solid rgba(249,237,217,.13);transition:all .2s}
  .recent-card:active{border-color:var(--orange)}
  .recent-emoji{font-size:2rem;margin-bottom:5px}
  .recent-name{font-size:.72rem;font-weight:800;color:var(--text);line-height:1.3}
  .empty{text-align:center;padding:18px;color:var(--dim);font-size:.9rem;font-weight:700}

  /* RESULT */
  .photo-wrap{position:relative;margin-bottom:16px}
  .photo-main{width:100%;border-radius:var(--r-lg);max-height:240px;object-fit:cover;box-shadow:var(--sh-lg)}
  .photo-badge{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.92);border-radius:var(--r-pill);padding:5px 14px;font-size:.78rem;font-weight:900;backdrop-filter:blur(4px)}
  .photo-badge.high{color:var(--success)}
  .photo-badge.medium{color:var(--amber)}
  .photo-badge.low{color:var(--red)}
  .name-card{background:rgba(249,199,79,.1);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;text-align:center;border:2px solid rgba(249,199,79,.3);box-shadow:var(--sh);animation:bounceIn .4s ease}
  .name-intro{font-size:.82rem;color:var(--dim);font-weight:800;margin-bottom:5px}
  .name-emoji{font-size:3.4rem;margin-bottom:6px}
  .name-sk{font-family:'Fredoka',cursive;font-size:2rem;color:#f9c74f;line-height:1}
  .name-en{font-size:.8rem;color:var(--light);font-style:italic;margin-top:4px}

  /* ALTERNATIVES */
  .alts{margin-bottom:14px;animation:fadeUp .35s ease .1s both}
  .alts-lbl{font-size:.8rem;font-weight:800;color:rgba(249,237,217,.5);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .alts-row{display:flex;gap:8px}
  .alt-chip{flex:1;background:rgba(255,255,255,.06);border:2px solid rgba(249,237,217,.13);border-radius:var(--r);color:#f9edd9;padding:10px 6px;text-align:center;font-size:.78rem;font-weight:800;transition:all .2s}
  .alt-chip:active{border-color:var(--green);background:#EFF8EE}
  .alt-emoji{font-size:1.35rem;display:block;margin-bottom:3px}

  /* FACT CARDS */
  .fact-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .fcard{background:rgba(255,255,255,.06);border-radius:var(--r);border:2px solid rgba(249,237,217,.12);box-shadow:var(--sh);animation:cardIn .38s ease both;overflow:hidden}
  .fcard-top{padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
  .fcard-icon{font-size:1.65rem;flex-shrink:0;padding-top:1px}
  .fcard-lbl{font-size:.75rem;font-weight:900;color:rgba(249,237,217,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .fcard-txt{font-size:.97rem;font-weight:700;line-height:1.55;color:var(--text)}
  .fcard-bot{border-top:1.5px solid var(--border);padding:9px 16px;display:flex;justify-content:flex-end}
  .spk-btn{display:flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:none;border-radius:var(--r-pill);padding:7px 16px;font-family:inherit;font-size:.8rem;font-weight:900;transition:all .2s}
  .spk-btn:active{transform:scale(.94)}
  .spk-btn.playing{background:var(--success)}
  .wv{display:inline-flex;gap:2px;align-items:center;height:12px}
  .wv span{display:inline-block;width:3px;background:#fff;border-radius:2px;height:8px;animation:wave .5s ease-in-out infinite}
  .wv span:nth-child(2){animation-delay:.1s}
  .wv span:nth-child(3){animation-delay:.2s}

  /* PARENT SECTION */
  .parent-box{background:rgba(76,175,118,.1);border-radius:var(--r);border:2px solid rgba(76,175,118,.25);margin-bottom:14px;overflow:hidden;animation:cardIn .38s ease .55s both}
  .parent-btn{width:100%;padding:13px 16px;background:none;border:none;display:flex;align-items:center;justify-content:space-between;font-family:inherit;font-size:.9rem;font-weight:900;color:#4caf76;cursor:pointer}
  .parent-arrow{transition:transform .25s}
  .parent-btn.open .parent-arrow{transform:rotate(180deg)}
  .parent-body{padding:0 16px 14px;display:none}
  .parent-body.open{display:block;animation:fadeUp .25s ease}
  .prow{margin-bottom:9px;font-size:.87rem;line-height:1.6;color:rgba(249,237,217,.85)}
  .prow strong{color:#4caf76;font-weight:900}
  .conf-note{font-size:.78rem;color:rgba(249,237,217,.55);padding:7px 12px;background:rgba(255,255,255,.07);border-radius:var(--r-sm);margin-top:8px;font-weight:700}

  /* CHIPS */
  .chips-wrap{margin-bottom:14px;animation:fadeUp .35s ease .65s both}
  .chips-lbl{font-size:.78rem;font-weight:900;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .chips-row{display:flex;flex-wrap:wrap;gap:7px}
  .chip{background:rgba(255,255,255,.07);border:2px solid rgba(249,237,217,.15);border-radius:var(--r-pill);padding:8px 16px;font-family:inherit;font-size:.83rem;font-weight:800;color:#f9edd9;transition:all .2s;white-space:nowrap}
  .chip:active{border-color:var(--green);background:rgba(76,175,118,.15);transform:scale(.95)}

  /* Q&A */
  .qa-box{background:rgba(255,255,255,.05);border:2px solid rgba(249,199,79,.2);border-radius:var(--r-lg);padding:14px;margin-bottom:14px;animation:fadeUp .35s ease .75s both}
  .qa-msgs{display:flex;flex-direction:column;gap:9px;margin-bottom:12px;max-height:240px;overflow-y:auto}
  .qa-q{align-self:flex-end;background:var(--green);color:#fff;border-radius:16px 16px 4px 16px;padding:9px 14px;font-size:.88rem;font-weight:800;max-width:85%}
  .qa-a{align-self:flex-start;background:rgba(255,255,255,.09);border-radius:16px 16px 16px 4px;padding:9px 14px;font-size:.88rem;font-weight:600;color:#f9edd9;max-width:90%;line-height:1.55;animation:fadeUp .25s ease}
  .qa-row{display:flex;gap:8px}
  .qa-inp{flex:1;background:rgba(255,255,255,.07);border:2px solid rgba(249,237,217,.18);border-radius:var(--r-pill);padding:11px 16px;font-family:inherit;font-size:.93rem;color:#f9edd9;outline:none;transition:border .2s;min-width:0;-webkit-appearance:none}
  .qa-inp:focus{border-color:var(--green)}
  .qa-inp::placeholder{color:var(--light)}
  .qa-send{width:42px;height:42px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
  .qa-send:active{transform:scale(.9)}
  .qa-send:disabled{opacity:.45}

  /* ROAR */
  .roar-btn{width:100%;border:none;border-radius:var(--r-pill);background:linear-gradient(135deg,#d43b28,#b02619);color:#fff;font-family:'Fredoka',cursive;font-size:1.35rem;font-weight:700;padding:17px;cursor:pointer;box-shadow:0 6px 20px rgba(180,40,30,.4);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;-webkit-appearance:none;margin-bottom:12px}
  .roar-btn:active{transform:scale(.96)}
  .roar-btn.roaring{animation:roarShake .45s ease-in-out}
  .roar-btn-sm{border:none;border-radius:var(--r-sm);color:#fff;font-family:'Fredoka',cursive;font-size:.95rem;font-weight:700;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:8px;transition:all .2s}
  .roar-btn-sm:active{transform:scale(.95)}

  /* COMPARE */
  .cmp-header{background:rgba(255,255,255,.06);border-radius:var(--r);border:2px solid rgba(249,237,217,.13);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
  .cmp-d1{flex:1;text-align:center}
  .cmp-vs{font-family:'Fredoka',cursive;font-size:1.4rem;color:var(--light);flex-shrink:0}
  .cmp-d2{flex:1;text-align:center}
  .upload-zone{display:block;border:3px dashed rgba(249,199,79,.35);border-radius:var(--r-lg);padding:32px 20px;text-align:center;transition:all .2s;margin-bottom:14px}
  .upload-zone:active{border-color:var(--green);background:rgba(111,175,106,.05)}
  .uz-icon{font-size:2.8rem;display:block;margin-bottom:8px;animation:hop 1.8s ease-in-out infinite}
  .uz-title{font-family:'Fredoka',cursive;font-size:1.2rem;color:#f9c74f;margin-bottom:3px}
  .uz-sub{font-size:.83rem;color:var(--dim)}
  .mini-cards{display:flex;gap:10px;margin-bottom:16px;animation:bounceIn .4s ease}
  .mini-card{flex:1;background:rgba(255,255,255,.06);border:2px solid rgba(249,237,217,.13);border-radius:var(--r);padding:12px 10px;text-align:center;min-width:0}
  .mini-card.amber{border-color:rgba(244,163,64,.4);background:rgba(244,163,64,.06)}
  .mini-card.blue{border-color:rgba(125,183,217,.4);background:rgba(125,183,217,.06)}
  .mini-img{width:100%;height:76px;object-fit:cover;border-radius:var(--r-sm);margin-bottom:6px}
  .mini-emoji{font-size:1.7rem;margin-bottom:3px}
  .mini-name{font-family:'Fredoka',cursive;font-size:.9rem;line-height:1.2}
  .mini-name.amber{color:var(--orange-d)}
  .mini-name.blue{color:#4A7DA7}
  .cmp-rows{margin-bottom:14px}
  .cmp-col-hdrs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;text-align:center}
  .cmp-fact-lbl{text-align:center;font-size:.74rem;font-weight:900;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin:6px 0 3px;display:flex;align-items:center;justify-content:center;gap:5px}
  .cmp-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;animation:cardIn .35s ease both}
  .cmp-a{background:rgba(244,163,64,.1);border:1.5px solid rgba(244,163,64,.28);border-radius:var(--r-sm);padding:9px 11px;font-size:.8rem;font-weight:800;line-height:1.4;color:var(--text)}
  .cmp-b{background:rgba(125,183,217,.1);border:1.5px solid rgba(125,183,217,.28);border-radius:var(--r-sm);padding:9px 11px;font-size:.8rem;font-weight:800;line-height:1.4;color:var(--text)}
  .cmp-a.diff{background:rgba(244,163,64,.22);border-color:rgba(244,163,64,.55)}
  .cmp-b.diff{background:rgba(125,183,217,.22);border-color:rgba(125,183,217,.55)}
  .cmp-summary{background:rgba(255,255,255,.06);border:2px solid rgba(249,237,217,.13);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;animation:fadeUp .35s ease}
  .cmp-sum-title{font-family:'Fredoka',cursive;font-size:.95rem;color:#f9c74f;margin-bottom:7px}
  .cmp-sum-text{font-size:.9rem;line-height:1.65;color:var(--text)}

  /* HISTORY / FAVS */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .saved-card{background:rgba(255,255,255,.06);border:2px solid rgba(249,237,217,.13);border-radius:var(--r);padding:16px;text-align:center;transition:all .2s}
  .saved-card:active{border-color:var(--orange);transform:scale(.97)}
  .saved-emoji{font-size:2.4rem;margin-bottom:7px}
  .saved-name{font-family:'Fredoka',cursive;font-size:.98rem;color:var(--text)}
  .saved-date{font-size:.73rem;color:rgba(249,237,217,.45);margin-top:4px}

  /* MISC */
  .gap{display:flex;flex-direction:column;gap:10px;margin-top:10px;margin-bottom:20px}
  .hidden{display:none!important}
  .divider{height:1.5px;background:var(--border);margin:14px 0}
  </style>
</head>
<body>

<!-- LOADING -->
<div id="overlay-loading">
  <div class="ld-dino" id="ld-emoji">🦕</div>
  <div class="ld-msg" id="ld-msg">Zauri kontroluje dino stopy…</div>
  <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
</div>

<!-- MEMORY -->
<div id="overlay-memory">
  <div class="mem-card">
    <div class="mem-emoji">🧠</div>
    <div class="mem-q" id="mem-q"></div>
    <div class="mem-opts" id="mem-opts"></div>
    <div class="mem-fb" id="mem-fb"></div>
    <button class="btn btn-green mem-cont" id="mem-cont" onclick="closeMemory()">Pokračovať →</button>
  </div>
</div>

<!-- ══════════ HOME ══════════ -->
<div class="screen active" id="s-home">

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let D1=null,D2=null,url1=null,url2=null,img1=null,img2=null;
let roaring1=false,roaring2=false,curAudio=null,factTmr=null,ldTmr=null,isFav=false;

const getR=()=>{try{return JSON.parse(localStorage.getItem('z_recent')||'[]')}catch{return[]}};
const setR=a=>localStorage.setItem('z_recent',JSON.stringify(a.slice(0,20)));
const getF=()=>{try{return JSON.parse(localStorage.getItem('z_favs')||'[]')}catch{return[]}};
const setF=a=>localStorage.setItem('z_favs',JSON.stringify(a));

// ══════════════════════════════════════════════
// LOADING MESSAGES
// ══════════════════════════════════════════════
const LMS=[
  ['🦕','Hmm… Zauri kontroluje dino stopy.'],
  ['🔍','Overujem s Medzinárodnou Dino Asociáciou…'],
  ['🦷','Pozerám na zuby, chvost a dino nohy…'],
  ['🎓','Profesor Triceratops rozmýšľa…'],
  ['📡','Dino radar pípá. Niečo sme našli.'],
  ['🏛️','Konzultujem s múzeom prehistórie…'],
  ['🦖','Analyzujem fosílie a stopy…'],
  ['⚗️','Zauri laboratórium pracuje naplno!'],
];
let ldIdx=0;
function startLoad(){
  document.getElementById('overlay-loading').classList.add('on');
  ldIdx=0;
  const show=()=>{const[e,m]=LMS[ldIdx%LMS.length];document.getElementById('ld-emoji').textContent=e;document.getElementById('ld-msg').textContent=m;ldIdx++;};
  show();ldTmr=setInterval(show,2200);
}
function stopLoad(){clearInterval(ldTmr);document.getElementById('overlay-loading').classList.remove('on');}

// ══════════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════════
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);el.classList.add('active');
  window.scrollTo(0,0);
  if(id==='s-history')renderHistory();
  if(id==='s-favorites')renderFavs();
}
function goHome(){renderRecent();go('s-home');}

// ══════════════════════════════════════════════
// IMAGE HANDLING
// ══════════════════════════════════════════════
function resize(file,cb){
  const MAX=1024,r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    const d=c.toDataURL('image/jpeg',.85).split(',');
    cb({base64:d[1],mediaType:'image/jpeg'});
  };img.src=e.target.result;};
  r.readAsDataURL(file);
}
function onFile1(inp){
  const f=inp.files[0];if(!f)return;
  url1=URL.createObjectURL(f);D1=null;
  resize(f,d=>{img1=d;scan1();});
  inp.value='';
}
function onFile2(inp){
  const f=inp.files[0];if(!f)return;
  url2=URL.createObjectURL(f);
  document.getElementById('photo2').src=url2;
  document.getElementById('cmp-preview').classList.remove('hidden');
  document.getElementById('cmp-upload').classList.add('hidden');
  resize(f,d=>{img2=d;});
  inp.value='';
}

// ══════════════════════════════════════════════
// API
// ══════════════════════════════════════════════
const PROMPT=`Si Zauri — priateľský a hravý dino sprievodca pre 4-ročné deti. Identifikuj dinosaura na obrázku.
Odpovedaj IBA ako JSON (žiadny iný text, žiadne backticks):
{"is_dinosaur":true,"confidence":"high|medium|low","name_sk":"bežný názov","name_en":"vedecký názov","emoji":"emoji","alternatives":[{"name_sk":"...","name_en":"...","emoji":"..."}],"roar_type":"deep|medium|light|chirpy","child":{"diet":"čo jedol, prirovnanie pre deti, max 2 vety","size":"veľkosť s prirovnaním ako auto/dom/autobus, 1 veta","features":"zuby/rohy/pancier/krk, max 2 vety hravé","speed":"rýchly alebo pomalý, prirovnanie, 1 veta","fun_fact":"prekvapujúca zaujímavosť, max 2 vety"},"parent":{"diet":"odbornejší popis stravy","size":"presné rozmery","period":"geologické obdobie + počet miliónov rokov","location":"kde na svete žil","fun_fact":"zaujímavosť pre rodiča"},"memory_question":{"question":"jednoduchá otázka pre dieťa","correct":"správna odpoveď","options":["možnosť1","možnosť2"]}}
Ak nie je dinosaurus: {"is_dinosaur":false,"reason":"krátke vysvetlenie"}
Pravidlá: Nikdy nepoužívaj grafické/násilné opisy. Vždy prirovnávaj k veciam ktoré deti poznajú (auto, dom, autobus, poschodový dom). roar_type: deep=veľký mäsožravec, medium=stredný, light=malý/bylinožravec, chirpy=vtáčí/malý. Alternatívy: 2 ak high, 3 ak medium/low.`;

async function api(msgs,maxTok=1000){
  const r=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs,max_tokens:maxTok})});
  const j=await r.json();
  if(!r.ok)throw new Error(j.error||'Chyba');
  return j.content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

// ══════════════════════════════════════════════
// SCAN 1
// ══════════════════════════════════════════════
const FACTS=[
  {icon:'📏',lbl:'Aký bol veľký?',key:'size'},
  {icon:'🍖',lbl:'Čo jedol?',key:'diet'},
  {icon:'🦷',lbl:'Ako sa bránil?',key:'features'},
  {icon:'💨',lbl:'Bol rýchly?',key:'speed'},
  {icon:'⚡',lbl:'Vedel si, že…',key:'fun_fact'},
];
const FALLBACKS=[
  'Ups, tento dinosaurus sa schováva pred kamerou! Skúsme znova. 🙈',
  'Potrebujeme viac dino stôp. Zuby? Rohy? Platne na chrbte?',
  'Skúsme zachytiť hlavu aj telo — potom to Zauri spozná!',
];

async function scan1(){
  if(!img1)return;
  startLoad();if(factTmr)clearInterval(factTmr);
  document.getElementById('fact-list').innerHTML='';
  document.getElementById('qa-msgs').innerHTML='';
  try{
    const raw=await api([{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:img1.mediaType,data:img1.base64}},
      {type:'text',text:PROMPT}
    ]}]);
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    stopLoad();
    if(!d.is_dinosaur){alert(FALLBACKS[Math.floor(Math.random()*FALLBACKS.length)]);return;}
    D1=d;addRecent(D1);showResult();
  }catch(e){stopLoad();alert('Ups, niečo sa pokazilo: '+(e.message||'Skús znova!'));}
}

function showResult(){
  // photo
  const pw=document.getElementById('photo-wrap1');
  if(url1){document.getElementById('photo1').src=url1;pw.style.display='block';}
  else{pw.style.display='none';}

  // confidence
  const cb=document.getElementById('conf-badge');
  const ci={high:'✅ Zauri je si istý!',medium:'🤔 Zauri si myslí…',low:'💡 Zauri háda…'}[D1.confidence]||'Zauri hovorí…';
  cb.textContent=ci;cb.className='photo-badge '+(D1.confidence||'');

  // fav
  isFav=getF().some(f=>f.name_en===D1.name_en);
  document.getElementById('fav-btn').textContent=isFav?'❤️':'🤍';

  // name
  const ii={high:'Toto je…',medium:'Myslíme si, že je to…',low:'Zauri háda, že je to…'};
  document.getElementById('name-intro').textContent=ii[D1.confidence]||'Toto vyzerá ako…';
  document.getElementById('name-emoji').textContent=D1.emoji;
  document.getElementById('name-sk').textContent=D1.name_sk;
  document.getElementById('name-en').textContent=D1.name_en;

  // alternatives
  const as=document.getElementById('alts-section');
  if(D1.alternatives&&D1.alternatives.length){
    document.getElementById('alts-row').innerHTML=D1.alternatives.map(a=>`<div class="alt-chip"><span class="alt-emoji">${a.emoji}</span>${a.name_sk}</div>`).join('');
    as.classList.remove('hidden');
  }else{as.classList.add('hidden');}

  // parent
  document.getElementById('parent-body').innerHTML=`
    <div class="prow"><strong>Strava:</strong> ${D1.parent.diet}</div>
    <div class="prow"><strong>Veľkosť:</strong> ${D1.parent.size}</div>
    <div class="prow"><strong>Kedy žil:</strong> ${D1.parent.period}</div>
    <div class="prow"><strong>Kde žil:</strong> ${D1.parent.location}</div>
    <div class="prow"><strong>Zaujímavosť:</strong> ${D1.parent.fun_fact}</div>
    <div class="conf-note">💡 Istota rozpoznania: ${D1.confidence==='high'?'vysoká':D1.confidence==='medium'?'stredná':'nízka'}</div>`;

  // chips
  const chips=['Bol väčší ako ja?','Mal ostrý zrak?','Mal kamarátov?','Bol nebezpečný?','Kde spal?'];
  document.getElementById('chips-row').innerHTML=chips.map(c=>`<button class="chip" onclick="useChip(this,'${c.replace(/'/g,"\\'")}')">  ${c}</button>`).join('');

  // hide extras initially
  document.getElementById('parent-box').style.display='none';
  document.getElementById('chips-wrap').style.display='none';
  document.getElementById('qa-box').style.display='none';
  document.getElementById('roar-btn1').classList.add('hidden');
  document.getElementById('result-actions').classList.add('hidden');

  // fact cards one by one
  const fl=document.getElementById('fact-list');fl.innerHTML='';
  let i=0;
  factTmr=setInterval(()=>{
    if(i>=FACTS.length){
      clearInterval(factTmr);
      document.getElementById('roar-btn1').classList.remove('hidden');
      document.getElementById('parent-box').style.display='block';
      document.getElementById('chips-wrap').style.display='block';
      document.getElementById('qa-box').style.display='block';
      document.getElementById('result-actions').classList.remove('hidden');
      showMemory();
      return;
    }
    const f=FACTS[i];const txt=D1.child[f.key];
    if(txt){
      const card=document.createElement('div');
      card.className='fcard';card.style.animationDelay=`${i*70}ms`;
      const bid=`spk-${i}`;
      card.innerHTML=`<div class="fcard-top"><span class="fcard-icon">${f.icon}</span><div><div class="fcard-lbl">${f.lbl}</div><div class="fcard-txt">${txt}</div></div></div><div class="fcard-bot"><button class="spk-btn" id="${bid}">🔊 Prečítať</button></div>`;
      fl.appendChild(card);
      const btn=document.getElementById(bid);
      btn.addEventListener('click',function(){speak(txt,D1.roar_type,this);});
    }
    i++;
  },280);

  go('s-result');
}

// ══════════════════════════════════════════════
// PARENT
// ══════════════════════════════════════════════
function toggleParent(){
  const btn=document.getElementById('parent-btn');
  const body=document.getElementById('parent-body');
  btn.classList.toggle('open');body.classList.toggle('open');
}

// ══════════════════════════════════════════════
// MEMORY
// ══════════════════════════════════════════════
function showMemory(){
  if(!D1?.memory_question)return;
  const mq=D1.memory_question;
  document.getElementById('mem-q').textContent=mq.question;
  document.getElementById('mem-fb').textContent='';
  document.getElementById('mem-fb').className='mem-fb';
  document.getElementById('mem-cont').style.display='none';
  const oo=document.getElementById('mem-opts');
  oo.innerHTML='';
  mq.options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='mem-opt';btn.textContent=opt;
    btn.addEventListener('click',function(){checkMem(opt,mq.correct,this,oo);});
    oo.appendChild(btn);
  });
  setTimeout(()=>document.getElementById('overlay-memory').classList.add('on'),700);
}
function checkMem(ans,correct,btn,oo){
  oo.querySelectorAll('.mem-opt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('mem-fb');
  if(ans===correct){
    btn.classList.add('correct');
    fb.textContent='🎉 Správne! Si skutočný dino prieskumník!';fb.className='mem-fb ok';
  }else{
    btn.classList.add('wrong');
    oo.querySelectorAll('.mem-opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
    fb.textContent=`Skoro! Správna odpoveď je: ${correct}`;fb.className='mem-fb no';
  }
  document.getElementById('mem-cont').style.display='block';
}
function closeMemory(){document.getElementById('overlay-memory').classList.remove('on');}

// ══════════════════════════════════════════════
// FAVORITES
// ══════════════════════════════════════════════
function toggleFav(){
  if(!D1)return;
  const favs=getF();const idx=favs.findIndex(f=>f.name_en===D1.name_en);
  if(idx>=0){favs.splice(idx,1);isFav=false;}
  else{favs.unshift({name_sk:D1.name_sk,name_en:D1.name_en,emoji:D1.emoji,date:new Date().toLocaleDateString('sk'),data:D1});isFav=true;}
  setF(favs);
  const btn=document.getElementById('fav-btn');
  btn.textContent=isFav?'❤️':'🤍';
  if(isFav){btn.style.animation='celebrate .45s ease';setTimeout(()=>btn.style.animation='',500);}
}

function addRecent(d){
  const r=getR().filter(x=>x.name_en!==d.name_en);
  r.unshift({name_sk:d.name_sk,name_en:d.name_en,emoji:d.emoji,date:new Date().toLocaleDateString('sk'),data:d});
  setR(r);
}
function renderRecent(){
  const r=getR();const c=document.getElementById('recent-row');
  if(!r.length){c.innerHTML='<div class="empty">Zatiaľ žiadny. Čo čakáš? 🦕</div>';return;}
  c.innerHTML=r.slice(0,8).map(x=>`<div class="recent-card" onclick="reopenDino('${x.name_en.replace(/'/g,"\\'")}')"><div class="recent-emoji">${x.emoji}</div><div class="recent-name">${x.name_sk}</div></div>`).join('');
}
function renderHistory(){
  const r=getR();const g=document.getElementById('history-grid');
  if(!r.length){g.innerHTML='<div class="empty" style="grid-column:1/-1">Zatiaľ žiadne objavy. Odfot prvého dina! 🦕</div>';return;}
  g.innerHTML=r.map(x=>`<div class="saved-card" onclick="reopenDino('${x.name_en.replace(/'/g,"\\'")}')"><div class="saved-emoji">${x.emoji}</div><div class="saved-name">${x.name_sk}</div><div class="saved-date">${x.date}</div></div>`).join('');
}
function renderFavs(){
  const f=getF();const g=document.getElementById('fav-grid');
  if(!f.length){g.innerHTML='<div class="empty" style="grid-column:1/-1">Ešte žiadni obľúbenci. Klikni ❤️ pri dinosaurovi! 🦕</div>';return;}
  g.innerHTML=f.map(x=>`<div class="saved-card" onclick="reopenDino('${x.name_en.replace(/'/g,"\\'")}')"><div class="saved-emoji">${x.emoji}</div><div class="saved-name">${x.name_sk}</div><div class="saved-date">${x.date}</div></div>`).join('');
}
function reopenDino(nameEn){
  const found=getR().find(r=>r.name_en===nameEn)||getF().find(f=>f.name_en===nameEn);
  if(found?.data){D1=found.data;url1=null;showResult();}
}

  try{
    const a=await api([{role:'user',content:`Si Zauri — priateľský dino sprievodca. Odpovedáš 4-ročnému dieťaťu po slovensky. Dinosaurus: ${D1.name_sk} (${D1.name_en}). Odpovedaj jednoducho, hravо, max 2 krátke vety. Použi prirovnania (auto, dom, autobus). Nikdy nepoužívaj grafické opisy. Otázka: ${q}`}],200);

function startCmp(){
  document.getElementById('cmp-e1').textContent=D1.emoji;
  document.getElementById('cmp-n1').textContent=D1.name_sk;
  resetCmp();go('s-compare');
}
function resetCmp(){
  D2=null;url2=null;img2=null;
  document.getElementById('cmp-upload').classList.remove('hidden');
  document.getElementById('cmp-preview').classList.add('hidden');
  document.getElementById('cmp-results').classList.add('hidden');
  document.getElementById('cmp-sum').classList.add('hidden');
  document.getElementById('cmp-qa').classList.add('hidden');
  document.getElementById('cmp-rows').innerHTML='';
  document.getElementById('cmp-qa-msgs').innerHTML='';
  document.getElementById('cmp-e2').textContent='❓';
  document.getElementById('cmp-n2').textContent='Kto?';
}
async function scanCmp(){
  if(!img2)return;
  document.getElementById('btn-cmp').disabled=true;
  startLoad();
  try{
    const raw=await api([{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:img2.mediaType,data:img2.base64}},
      {type:'text',text:PROMPT}
    ]}]);
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    stopLoad();
    if(!d.is_dinosaur){alert('Toto nie je dinosaurus! Skús inú fotku.');document.getElementById('btn-cmp').disabled=false;return;}
    D2=d;
    document.getElementById('cmp-e2').textContent=D2.emoji;
    document.getElementById('cmp-n2').textContent=D2.name_sk;
    showCmpResults();
    genCmpSummary();
  }catch(e){stopLoad();document.getElementById('btn-cmp').disabled=false;}
}
function showCmpResults(){
  document.getElementById('mc-img1').src=url1||'';
  document.getElementById('mc-img2').src=url2;
  document.getElementById('mc-e1').textContent=D1.emoji;document.getElementById('mc-e2').textContent=D2.emoji;
  document.getElementById('mc-n1').textContent=D1.name_sk;document.getElementById('mc-n2').textContent=D2.name_sk;
  const rows=document.getElementById('cmp-rows');
  rows.innerHTML=`<div class="cmp-col-hdrs"><div style="font-family:'Fredoka',cursive;font-size:.9rem;color:var(--orange-d)">${D1.emoji} ${D1.name_sk}</div><div style="font-family:'Fredoka',cursive;font-size:.9rem;color:#4A7DA7">${D2.emoji} ${D2.name_sk}</div></div>`;
  const cfs=[{icon:'📏',lbl:'Veľkosť',k:'size'},{icon:'🍖',lbl:'Strava',k:'diet'},{icon:'🦷',lbl:'Zbrane',k:'features'},{icon:'💨',lbl:'Rýchlosť',k:'speed'}];
  cfs.forEach((f,i)=>{
    const v1=D1.child[f.k]||'—',v2=D2.child[f.k]||'—',diff=v1!==v2;
    rows.innerHTML+=`<div class="cmp-fact-lbl">${f.icon} ${f.lbl}</div><div class="cmp-row" style="animation-delay:${i*90}ms"><div class="cmp-a${diff?' diff':''}">${v1}</div><div class="cmp-b${diff?' diff':''}">${v2}</div></div>`;
  });
  document.getElementById('cmp-results').classList.remove('hidden');
}
async function genCmpSummary(){
  try{
    const txt=await api([{role:'user',content:`Si Zauri. Porovnaj ${D1.name_sk} a ${D2.name_sk} pre 4-ročné dieťa po slovensky. Zdôrazni 2-3 hlavné rozdiely veselo. Použi prirovnania (auto, dom, autobus). Max 3 vety.`}],250);
    document.getElementById('cmp-sum-txt').textContent=txt;
    document.getElementById('cmp-sum').classList.remove('hidden');
    document.getElementById('cmp-qa').classList.remove('hidden');
  }catch(e){}
}

// ══════════════════════════════════════════════
// TTS
// ══════════════════════════════════════════════
async function speak(txt,rt,btn){
  if(curAudio){curAudio.pause();curAudio=null;}
  if(btn.classList.contains('playing')){btn.classList.remove('playing');btn.innerHTML='🔊 Prečítať';return;}
  document.querySelectorAll('.spk-btn.playing').forEach(b=>{b.classList.remove('playing');b.innerHTML='🔊 Prečítať';});
  btn.classList.add('loading');btn.innerHTML='<div class="wv"><span></span><span></span><span></span></div> Načítavam…';
  try{
    const r=await fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt,roar_type:rt||'deep'})});
    if(!r.ok)throw new Error();
    const blob=await r.blob();const u=URL.createObjectURL(blob);
    curAudio=new Audio(u);curAudio.play();
    btn.classList.remove('loading');btn.classList.add('playing');btn.innerHTML='<div class="wv"><span></span><span></span><span></span></div> Hrá…';
    curAudio.onended=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 Prečítať';curAudio=null;};
  }catch(e){btn.classList.remove('loading');btn.innerHTML='🔊 Prečítať';}
}

// ══════════════════════════════════════════════
// ROAR
// ══════════════════════════════════════════════
function playRoar(t){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();const tm=ctx.currentTime;
    const cfg={deep:{f:48,d:3.4,v:.32},medium:{f:95,d:2.6,v:.27},light:{f:165,d:2,v:.23},chirpy:{f:320,d:1.4,v:.2}}[t]||{f:48,d:3.4,v:.32};
    const mws=a=>{const ws=ctx.createWaveShaper(),c=new Float32Array(256);for(let i=0;i<256;i++){const x=i*2/256-1;c[i]=(Math.PI+a)*x/(Math.PI+a*Math.abs(x));}ws.curve=c;return ws;};
    [[1,'sawtooth'],[1.5,'sawtooth'],[2,'square'],[2.9,'sawtooth'],[4.1,'square'],[.5,'sine']].forEach(([h,wt],i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain(),ws=mws(150-i*15);
      o.type=wt;o.frequency.setValueAtTime(cfg.f*h,tm);o.frequency.linearRampToValueAtTime(cfg.f*h*.68,tm+cfg.d);
      const v=cfg.v/Math.pow(i+1,.58);
      g.gain.setValueAtTime(0,tm);g.gain.linearRampToValueAtTime(v,tm+.12);g.gain.setValueAtTime(v,tm+cfg.d*.62);g.gain.exponentialRampToValueAtTime(.001,tm+cfg.d);
      o.connect(ws);ws.connect(g);g.connect(ctx.destination);o.start(tm);o.stop(tm+cfg.d);
    });
    return cfg.d*1000;
  }catch(e){return 2500;}
}
function roar(which){
  const d=which===1?D1:D2;if(!d)return;
  const ir=which===1?roaring1:roaring2;if(ir)return;
  const cmpActive=document.getElementById('s-compare').classList.contains('active');
  let btnId=which===1?(cmpActive?'roar-cmp1':'roar-btn1'):'roar-cmp2';
  const btn=document.getElementById(btnId);if(!btn)return;
  const dur=playRoar(d.roar_type);
  if(which===1)roaring1=true;else roaring2=true;
  btn.classList.add('roaring');
  const orig=btn.innerHTML;btn.innerHTML='🦖 RRRAAAARGH!!!';
  setTimeout(()=>{if(which===1)roaring1=false;else roaring2=false;btn.classList.remove('roaring');btn.innerHTML=orig;},dur+200);
}
